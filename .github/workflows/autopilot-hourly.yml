# Hourly backup for fifty-states SLA — all enabled sites.

name: Autopilot hourly pulse

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:
    inputs:
      site:
        description: "Single site id (empty = all enabled)"
        default: ""

concurrency:
  group: autopilot-hourly-${{ github.event.inputs.site || 'all' }}
  cancel-in-progress: false

jobs:
  resolve-sites:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.out.outputs.sites }}
    steps:
      - uses: actions/checkout@v4
      - id: out
        run: |
          SITES=$(python3 -c "
          import json
          c=json.load(open('config/autopilot-sites.json'))
          req='${{ github.event.inputs.site }}'.strip()
          ids=[s['id'] for s in c['sites'] if s.get('enabled')]
          if req:
            ids=[req] if req in ids else []
          print(json.dumps(ids))
          ")
          echo "sites=$SITES" >> "$GITHUB_OUTPUT"

  hourly:
    needs: resolve-sites
    if: needs.resolve-sites.outputs.sites != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      matrix:
        site: ${{ fromJson(needs.resolve-sites.outputs.sites) }}
      max-parallel: 2
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: |
          pip install -r scripts/autopilot_requirements.txt
          npm ci
          python3 -m venv .venv
          .venv/bin/pip install -q -r scripts/autopilot_requirements.txt

      - name: Resolve content root
        id: meta
        run: |
          python3 -c "
          import json
          for s in json.load(open('config/autopilot-sites.json'))['sites']:
            if s['id']=='${{ matrix.site }}':
              print('url='+s['siteUrl'])
              print('root='+s.get('contentRoot','content'))
          " >> "$GITHUB_OUTPUT"

      - name: Top-up missing states (max 3 this hour)
        env:
          AUTOPILOT_SOURCE: github-hourly-pulse
          FIFTY_STATES_ONLY: "1"
        run: |
          .venv/bin/python scripts/publish_fifty_states_now.py \
            --site "${{ matrix.site }}" \
            --batch-size 3 \
            --max-rounds 1 \
            || true
          .venv/bin/python scripts/autopilot_daily_guard.py --record-only --site "${{ matrix.site }}"

      - name: Commit and push
        run: |
          ROOT="${{ steps.meta.outputs.root }}"
          git config user.name "autopilot-hourly-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${ROOT}/blog/"*.md "${ROOT}/blog/es/"*.md "${ROOT}/autopilot/" "${ROOT}/syndication/" \
            public/blog/presentations/*.pptx public/blog/presentations/es/*.pptx 2>/dev/null || true
          git diff --staged --quiet && exit 0
          git commit -m "content(hourly): ${{ matrix.site }} $(date -u +%Y-%m-%dT%H)"
          git push

      - name: GEO repair + IndexNow + backlinks
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          SITE_ID="${{ matrix.site }}"
          python3 scripts/geo_automation.py --site "$SITE_ID" --repair-blogs --index-only --recent 80 || true
          bash scripts/ci/index_site.sh "${{ steps.meta.outputs.url }}"
