# Hourly backup for fifty-states SLA (GitHub runs this — not your Mac, not Cursor chat).

name: Autopilot hourly pulse

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

concurrency:
  group: autopilot-hourly-wreckmatch
  cancel-in-progress: false

jobs:
  hourly:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: |
          pip install -r scripts/autopilot_requirements.txt
          npm ci
          python3 -m venv .venv
          .venv/bin/pip install -q -r scripts/autopilot_requirements.txt

      - name: Top-up missing states (max 3 this hour)
        env:
          AUTOPILOT_SOURCE: github-hourly-pulse
          FIFTY_STATES_ONLY: "1"
        run: |
          .venv/bin/python scripts/publish_fifty_states_now.py \
            --site wreckmatch \
            --batch-size 3 \
            --max-rounds 1
          .venv/bin/python scripts/autopilot_daily_guard.py --record-only --site wreckmatch

      - name: Commit and push
        run: |
          git config user.name "autopilot-hourly-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/blog/*.md content/blog/es/*.md content/autopilot/ content/syndication/ \
            public/blog/presentations/*.pptx public/blog/presentations/es/*.pptx 2>/dev/null || true
          git diff --staged --quiet && exit 0
          git commit -m "content(hourly): fifty-state top-up $(date -u +%Y-%m-%dT%H)"
          git push

      - name: IndexNow + backlinks
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE: https://www.wreckmatch.com
        run: |
          .venv/bin/python scripts/organic_crush.py --mesh-limit 30 --viral-limit 2 || true
          .venv/bin/python scripts/indexing_accelerator.py --recent 320 || true
          if [ -n "$CRON_SECRET" ]; then
            curl -sf -H "Authorization: Bearer $CRON_SECRET" "$SITE/api/indexing/cron" || true
          fi
