# 24/7 pulse — top up today's 50-post SLA if a run was missed; index + backlink without extra publishing cap breach.

name: Autopilot hourly pulse

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

concurrency:
  group: autopilot-hourly-${{ github.event.inputs.site || 'wreckmatch' }}
  cancel-in-progress: false

jobs:
  hourly:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: |
          pip install -r scripts/autopilot_requirements.txt
          npm ci

      - name: Inject 50-state topics + publish deficit (max 3/hour)
        env:
          AUTOPILOT_SOURCE: github-hourly-pulse
        run: |
          SITE="${{ github.event.inputs.site || 'wreckmatch' }}"
          python3 scripts/wreckmatch_blog_autopilot.py --inject-daily-states --site "$SITE"
          python3 scripts/autopilot_daily_guard.py --ensure-today --site "$SITE" --max-batch 3

      - name: PowerPoint companions (EN + ES, missing only)
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -q -r scripts/autopilot_requirements.txt
          .venv/bin/python scripts/generate_blog_presentations.py --missing-only
          .venv/bin/python scripts/generate_blog_presentations.py --missing-only --locale es

      - name: Commit new posts
        run: |
          git config user.name "autopilot-hourly-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/blog/*.md content/blog/es/*.md content/autopilot/ content/syndication/ public/blog/presentations/*.pptx public/blog/presentations/es/*.pptx 2>/dev/null || true
          git diff --staged --quiet && exit 0
          git commit -m "content(hourly): EN+ES platinum posts $(date -u +%Y-%m-%dT%H)"
          git push

      - name: IndexNow + organic mesh
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE: https://www.wreckmatch.com
        run: |
          python3 scripts/indexing_accelerator.py --recent 320 || true
          python3 scripts/organic_crush.py --mesh-limit 30 --viral-limit 2 || true
          if [ -n "$CRON_SECRET" ]; then
            curl -sf -H "Authorization: Bearer $CRON_SECRET" "$SITE/api/indexing/cron" || true
          fi
