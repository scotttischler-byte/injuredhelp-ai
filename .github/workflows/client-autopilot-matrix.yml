# Multi-site autopilot: same 50-state SLA as fifty-states-daily (pulse every 6h).

name: Client autopilot matrix

on:
  schedule:
    - cron: "15 */6 * * *"
  workflow_dispatch:
    inputs:
      site:
        description: "Single site id (empty = all enabled)"
        default: ""
      full_sprint:
        description: "Full sprint (15 rounds) vs pulse (3)"
        type: boolean
        default: false

jobs:
  resolve-sites:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.out.outputs.sites }}
    steps:
      - uses: actions/checkout@v4
      - id: out
        run: |
          SITES=$(python3 -c "
          import json
          c=json.load(open('config/autopilot-sites.json'))
          req='${{ github.event.inputs.site }}'.strip()
          ids=[s['id'] for s in c['sites'] if s.get('enabled')]
          if req:
            ids=[req] if req in ids else []
          print(json.dumps(ids))
          ")
          echo "sites=$SITES" >> "$GITHUB_OUTPUT"

  run-site:
    needs: resolve-sites
    if: needs.resolve-sites.outputs.sites != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        site: ${{ fromJson(needs.resolve-sites.outputs.sites) }}
      max-parallel: 2
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: |
          pip install -r scripts/autopilot_requirements.txt
          npm ci
          python3 -m venv .venv
          .venv/bin/pip install -q -r scripts/autopilot_requirements.txt
          chmod +x scripts/ci/*.sh
      - name: Resolve paths
        id: meta
        run: |
          python3 -c "
          import json
          for s in json.load(open('config/autopilot-sites.json'))['sites']:
            if s['id']=='${{ matrix.site }}':
              print('url='+s['siteUrl'])
              print('root='+s.get('contentRoot','content'))
          " >> "$GITHUB_OUTPUT"
      - name: Fifty-state publish (${{ matrix.site }})
        env:
          AUTOPILOT_SOURCE: github-matrix
        run: |
          if [ "${{ github.event.inputs.full_sprint }}" = "true" ]; then
            bash scripts/ci/fifty_states_publish.sh "${{ matrix.site }}" full
          else
            bash scripts/ci/fifty_states_publish.sh "${{ matrix.site }}" pulse
          fi
      - name: Commit site content
        run: |
          ROOT="${{ steps.meta.outputs.root }}"
          git config user.name "client-autopilot-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${ROOT}/" content/ config/autopilot/ public/blog/ data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "content(autopilot): ${{ matrix.site }} fifty-state batch"
          git push || true
      - name: Index site
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: bash scripts/ci/index_site.sh "${{ steps.meta.outputs.url }}"
