# 10x exposure — IndexNow + AI citation monitor (daily)
name: Exposure crush

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      live_ai:
        description: "Run Perplexity live citation check"
        type: boolean
        default: false

concurrency:
  group: exposure-crush
  cancel-in-progress: false

jobs:
  crush:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: pip install -r scripts/autopilot_requirements.txt

      - name: Run GEO + exposure crush
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          WRECKMATCH_SITE: https://www.wreckmatch.com
        run: |
          python3 scripts/geo_automation.py --repair-blogs --recent 320
          ARGS="--recent 320 --skip-index"
          if [ "${{ github.event.inputs.live_ai }}" = "true" ] && [ -n "$PERPLEXITY_API_KEY" ]; then
            ARGS="$ARGS --live-ai"
          fi
          python3 scripts/exposure_crush.py $ARGS

      - name: Commit exposure reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/autopilot/exposure_report.json content/autopilot/ai_citation_report.json content/autopilot/geo_automation_report.json content/autopilot/indexing_log.jsonl content/autopilot/indexnow_pending.json sites/semitruckmatch/content/autopilot/indexnow_pending.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore(exposure): daily IndexNow + AI citation report"
          git push || true

      - name: Ping production IndexNow cron (uses CRON_SECRET from repo)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET missing on GitHub — Vercel crons still run if set there"
            exit 0
          fi
          for origin in https://www.wreckmatch.com https://www.semitruckmatch.com https://injuredhelp.ai; do
            for path in /api/geo/cron /api/exposure/cron; do
              code=$(curl -s -o /tmp/cron-out.json -w "%{http_code}" \
                -H "Authorization: Bearer $CRON_SECRET" "$origin$path")
              echo "$origin$path -> HTTP $code"
              [ "$code" = "200" ] && break 2
            done
          done
          for path in /api/indexing/cron; do
            code=$(curl -s -o /tmp/cron-out.json -w "%{http_code}" \
              -H "Authorization: Bearer $CRON_SECRET" "https://www.wreckmatch.com$path")
            echo "$path -> HTTP $code"
            head -c 500 /tmp/cron-out.json
            echo ""
            [ "$code" = "200" ] && break
          done
