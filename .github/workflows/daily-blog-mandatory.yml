# Delegates to fifty-states-daily.yml — kept for Vercel failsafe dispatch compatibility.

name: Daily blog SLA (mandatory)

on:
  workflow_dispatch:
    inputs:
      site:
        description: "Site id"
        default: "wreckmatch"

concurrency:
  group: daily-blog-sla-${{ github.event.inputs.site || 'wreckmatch' }}
  cancel-in-progress: false

jobs:
  trigger-fifty-states:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch permanent fifty-states workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run "Fifty states daily (permanent)" --ref main -f full_sprint=true
          echo "Dispatched fifty-states-daily.yml (full sprint)"
