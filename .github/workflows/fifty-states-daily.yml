# PERMANENT: Top city in each of 50 US states — every UTC day, every enabled site.
# config/autopilot-sites.json → matrix.site

name: Fifty states daily (permanent)

on:
  schedule:
    - cron: "10 0 * * *"
    - cron: "10 3,6,9,12,15,18,21 * * *"
    - cron: "50 23 * * *"
  workflow_dispatch:
    inputs:
      full_sprint:
        description: "Run full sprint (15 rounds) instead of pulse (3)"
        type: boolean
        default: false
      site:
        description: "Single site id (empty = all enabled)"
        default: ""

concurrency:
  group: fifty-states-daily-${{ github.event.inputs.site || 'all' }}
  cancel-in-progress: false

jobs:
  resolve-sites:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.out.outputs.sites }}
    steps:
      - uses: actions/checkout@v4
      - id: out
        run: |
          SITES=$(python3 -c "
          import json
          c=json.load(open('config/autopilot-sites.json'))
          req='${{ github.event.inputs.site }}'.strip()
          ids=[s['id'] for s in c['sites'] if s.get('enabled')]
          if req:
            ids=[req] if req in ids else []
          print(json.dumps(ids))
          ")
          echo "sites=$SITES" >> "$GITHUB_OUTPUT"

  fifty-states:
    needs: resolve-sites
    if: needs.resolve-sites.outputs.sites != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      matrix:
        site: ${{ fromJson(needs.resolve-sites.outputs.sites) }}
      max-parallel: 2
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: |
          pip install -r scripts/autopilot_requirements.txt
          npm ci
          python3 -m venv .venv
          .venv/bin/pip install -q -r scripts/autopilot_requirements.txt
          chmod +x scripts/ci/*.sh

      - name: Resolve site URL
        id: meta
        run: |
          python3 -c "
          import json
          c=json.load(open('config/autopilot-sites.json'))
          for s in c['sites']:
            if s['id']=='${{ matrix.site }}':
              print('url='+s['siteUrl'])
              print('root='+s.get('contentRoot','content'))
              break
          " >> "$GITHUB_OUTPUT"

      - name: End-of-day gate (50 states required)
        if: github.event.schedule == '50 23 * * *'
        run: .venv/bin/python scripts/autopilot_daily_guard.py --verify-today --site "${{ matrix.site }}"

      - name: Publish top 50 cities × 50 states
        if: github.event.schedule != '50 23 * * *'
        env:
          AUTOPILOT_SOURCE: github-fifty-states-daily
        run: |
          if [ "${{ github.event.schedule }}" = "10 0 * * *" ] || [ "${{ github.event.inputs.full_sprint }}" = "true" ]; then
            bash scripts/ci/fifty_states_publish.sh "${{ matrix.site }}" full
          else
            bash scripts/ci/fifty_states_publish.sh "${{ matrix.site }}" pulse
          fi

      - name: Commit and push (Vercel deploy)
        if: github.event.schedule != '50 23 * * *'
        run: |
          ROOT="${{ steps.meta.outputs.root }}"
          git config user.name "fifty-states-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${ROOT}/blog/"*.md "${ROOT}/blog/es/"*.md "${ROOT}/autopilot/" "${ROOT}/syndication/" \
            public/blog/covers/generated/*.webp public/blog/presentations/*.pptx \
            public/blog/presentations/es/*.pptx data/blog-cover-assignments.json 2>/dev/null || true
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "content(fifty-states): ${{ matrix.site }} $(date -u +%Y-%m-%dT%H) UTC"
          git push

      - name: Backlinks + IndexNow
        if: github.event.schedule != '50 23 * * *'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          sleep 90
          bash scripts/ci/index_site.sh "${{ steps.meta.outputs.url }}"
