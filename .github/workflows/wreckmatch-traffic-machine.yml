# WreckMatch Traffic Machine — indexing, assets, organic (publishing: daily-blog-mandatory.yml)
# Every 30 min: IndexNow + covers | Daily 08:00 UTC: corpus improvements + SLA catch-up

name: WreckMatch traffic machine

on:
  schedule:
    - cron: "*/30 * * * *"
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      batch:
        description: "Posts per run (manual only; schedule uses SLA workflow)"
        default: "10"
      catchup:
        description: "Run catch-up for missed days (1=yes)"
        default: "0"
      site:
        description: "Site id (config/autopilot-sites.json)"
        default: "wreckmatch"
      refill:
        description: "Refill queue (0=skip)"
        default: "0"
      skip_remote_cron:
        description: "Skip calling production cron APIs"
        type: boolean
        default: false

concurrency:
  group: wreckmatch-traffic-machine-${{ github.event.inputs.site || 'wreckmatch' }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: |
          pip install -r scripts/autopilot_requirements.txt
          npm ci

      - name: Secret status (no values logged)
        env:
          HAS_ANTHROPIC: ${{ secrets.ANTHROPIC_API_KEY != '' }}
          HAS_OPENAI: ${{ secrets.OPENAI_API_KEY != '' }}
          HAS_CRON: ${{ secrets.CRON_SECRET != '' }}
        run: |
          echo "ANTHROPIC_API_KEY: $([ \"$HAS_ANTHROPIC\" = true ] && echo set || echo optional)"
          echo "CRON_SECRET: $([ \"$HAS_CRON\" = true ] && echo set || echo MISSING — add same value as Vercel)"
          echo "Publishing SLA: daily-blog-mandatory.yml (50 EN/day). This workflow: index + assets."

      - name: Refill topic queue
        if: github.event.inputs.refill != '' && github.event.inputs.refill != '0'
        run: |
          python scripts/wreckmatch_blog_autopilot.py --refill "${{ github.event.inputs.refill }}" --site "${{ github.event.inputs.site || 'wreckmatch' }}"

      - name: Ensure queue depth
        run: |
          python -c "
          import json, pathlib, subprocess
          site = '${{ github.event.inputs.site || 'wreckmatch' }}'
          p = pathlib.Path('content/autopilot/blog_queue.json')
          q = json.loads(p.read_text())
          if len(q.get('pending', [])) < 400:
            subprocess.run(['python', 'scripts/wreckmatch_blog_autopilot.py', '--refill', '8000', '--site', site], check=True)
          "

      - name: Morning SLA catch-up (max 10 if under 50 today)
        if: github.event_name == 'schedule' && github.event.schedule == '0 8 * * *'
        env:
          AUTOPILOT_SOURCE: github-traffic-machine
        run: |
          python3 scripts/autopilot_daily_guard.py --ensure-today --site "${{ github.event.inputs.site || 'wreckmatch' }}" --max-batch 10 || true

      - name: Set batch size
        id: batch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "size=${{ github.event.inputs.batch || '10' }}" >> "$GITHUB_OUTPUT"
          else
            echo "size=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate posts (manual dispatch only)
        if: steps.batch.outputs.size != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WRECKMATCH_SITE: https://www.wreckmatch.com
          TRAFFIC_MACHINE_SYNDICATE: "1"
          TRAFFIC_MACHINE_MIN_SCORE: "100"
          TRAFFIC_MACHINE_MIN_WORDS: "3000"
          AUTOPILOT_SOURCE: github-traffic-machine
        run: |
          SITE="${{ github.event.inputs.site || 'wreckmatch' }}"
          BATCH="${{ steps.batch.outputs.size }}"
          EXTRA=""
          if [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ] || [ -n "${{ secrets.OPENAI_API_KEY }}" ]; then
            EXTRA="--ai --claude-first"
          fi
          python scripts/wreckmatch_blog_autopilot.py \
            --batch "$BATCH" \
            --site "$SITE" \
            $EXTRA \
            --syndicate \
            --delay 4 \
            --min-score 100 \
            --min-words 3000

      - name: Daily corpus improvements
        if: github.event_name == 'schedule' && github.event.schedule == '0 8 * * *'
        run: python scripts/autopilot_daily_improvements.py

      - name: Generate unique blog covers for new posts
        run: npm run generate:blog-covers -- --missing-only

      - name: Install presentation deps
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r scripts/autopilot_requirements.txt

      - name: Generate blog PowerPoint companions
        run: npm run generate:blog-presentations

      - name: Commit and push (Vercel deploy)
        id: commit
        run: |
          git config user.name "wreckmatch-traffic-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/blog/*.md content/blog/es/*.md content/syndication/ content/autopilot/ public/blog/covers/generated/*.webp public/blog/presentations/*.pptx public/blog/presentations/es/*.pptx data/blog-cover-assignments.json
          git diff --staged --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" && echo "No changes" && exit 0
          git commit -m "content(traffic-machine): indexing assets + daily improvements"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Accelerate indexing (every run)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE: https://www.wreckmatch.com
        run: |
          python3 scripts/indexing_accelerator.py --recent 320 || true
          if [ -z "$CRON_SECRET" ]; then
            echo "::warning::CRON_SECRET missing on GitHub — IndexNow prod ping skipped"
            exit 0
          fi
          if [ "${{ steps.commit.outputs.changed }}" = "true" ]; then
            echo "Waiting 90s for Vercel production deploy..."
            sleep 90
          fi
          curl -sf -H "Authorization: Bearer $CRON_SECRET" "$SITE/api/indexing/cron" || true

      - name: Notify search engines (IndexNow via production)
        if: steps.commit.outputs.changed == 'true'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE: https://www.wreckmatch.com
        run: |
          SLUGS=$(git diff-tree --no-commit-id --name-only -r HEAD | grep '^content/blog/.*\.md$' | sed 's|.*/||;s|\.md||' | tr '\n' ' ')
          export SLUGS
          python3 scripts/exposure_crush.py --slugs $SLUGS --recent 320 || true
          python3 scripts/organic_crush.py --mesh-limit 12 --viral-limit 3 --slugs $SLUGS || true
          if [ -z "$CRON_SECRET" ]; then exit 0; fi
          python3 -c "
          import json, os, urllib.request
          slugs = [s for s in os.environ.get('SLUGS', '').split() if s]
          body = json.dumps({'slugs': slugs}).encode()
          req = urllib.request.Request(
              os.environ['SITE'] + '/api/indexing/notify',
              data=body,
              headers={
                  'Authorization': 'Bearer ' + os.environ['CRON_SECRET'],
                  'Content-Type': 'application/json',
              },
              method='POST',
          )
          with urllib.request.urlopen(req, timeout=90) as r:
              print('Production IndexNow notify:', r.read().decode()[:500])
          "

      - name: Trigger production cron (social + reddit)
        if: github.event.inputs.skip_remote_cron != 'true'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE: https://www.wreckmatch.com
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::warning::CRON_SECRET not set on GitHub repo secrets"
            exit 0
          fi
          for path in /api/automation/social /api/automation/reddit; do
            echo "Calling $SITE$path"
            curl -sf -H "Authorization: Bearer $CRON_SECRET" "$SITE$path" || echo "warn: $path failed"
            sleep 5
          done
