# WreckMatch Traffic Machine — quality-first organic growth
# Every 30 min: up to 3 gold-tier posts (score ≥95, 2000+ words)

name: WreckMatch traffic machine

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      batch:
        description: "Posts per run"
        default: "3"
      refill:
        description: "Refill queue (0=skip)"
        default: "0"
      skip_remote_cron:
        description: "Skip calling production cron APIs"
        type: boolean
        default: false

concurrency:
  group: wreckmatch-traffic-machine
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: |
          pip install -r scripts/autopilot_requirements.txt
          npm ci

      - name: Secret status (no values logged)
        env:
          HAS_ANTHROPIC: ${{ secrets.ANTHROPIC_API_KEY != '' }}
          HAS_OPENAI: ${{ secrets.OPENAI_API_KEY != '' }}
          HAS_CRON: ${{ secrets.CRON_SECRET != '' }}
          HAS_INDEXNOW: ${{ secrets.INDEXNOW_KEY != '' }}
        run: |
          echo "ANTHROPIC_API_KEY: $([ \"$HAS_ANTHROPIC\" = true ] && echo set || echo missing - template posts)"
          echo "OPENAI_API_KEY: $([ \"$HAS_OPENAI\" = true ] && echo set || echo missing)"
          echo "CRON_SECRET: $([ \"$HAS_CRON\" = true ] && echo set || echo missing - skip prod IndexNow + cron)"
          echo "INDEXNOW_KEY (GitHub): $([ \"$HAS_INDEXNOW\" = true ] && echo set || echo optional - IndexNow uses Vercel via CRON_SECRET)"

      - name: Refill topic queue
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.refill != '' && github.event.inputs.refill != '0'
        run: python scripts/wreckmatch_blog_autopilot.py --refill "${{ github.event.inputs.refill }}"

      - name: Ensure queue depth
        run: |
          python -c "
          import json, pathlib, subprocess
          p = pathlib.Path('content/autopilot/blog_queue.json')
          q = json.loads(p.read_text())
          if len(q.get('pending', [])) < 400:
            subprocess.run(['python', 'scripts/wreckmatch_blog_autopilot.py', '--refill', '8000'], check=True)
          "

      - name: Generate posts + syndication (Claude-first)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
          OPENAI_MODEL: gpt-4o-mini
          WRECKMATCH_SITE: https://www.wreckmatch.com
          TRAFFIC_MACHINE_SYNDICATE: "1"
          TRAFFIC_MACHINE_MIN_SCORE: "95"
          TRAFFIC_MACHINE_MIN_WORDS: "2000"
        run: |
          BATCH="${{ github.event.inputs.batch || '3' }}"
          python scripts/wreckmatch_blog_autopilot.py \
            --batch "$BATCH" \
            --ai \
            --claude-first \
            --syndicate \
            --delay 4 \
            --min-score 95 \
            --min-words 2000
          # Skips posts below gold bar instead of publishing thin content.

      - name: Generate unique blog covers for new posts
        run: npm run generate:blog-covers -- --missing-only

      - name: Commit and push (Vercel deploy)
        id: commit
        run: |
          git config user.name "wreckmatch-traffic-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/blog/*.md content/syndication/ content/autopilot/ public/blog/covers/generated/*.webp data/blog-cover-assignments.json
          git diff --staged --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" && echo "No changes" && exit 0
          git commit -m "content(traffic-machine): gold-tier truck/severe injury guides"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Notify search engines (IndexNow via production)
        if: steps.commit.outputs.changed == 'true'
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE: https://www.wreckmatch.com
        run: |
          SLUGS=$(git diff-tree --no-commit-id --name-only -r HEAD | grep '^content/blog/.*\.md$' | sed 's|.*/||;s|\.md||' | tr '\n' ' ')
          export SLUGS
          # Optional duplicate ping from GitHub (INDEXNOW_KEY secret). Vercel already has the key.
          if [ -n "$INDEXNOW_KEY" ]; then
            python3 scripts/indexing_accelerator.py --from-git HEAD~1 --new-slugs $SLUGS || true
          else
            echo "INDEXNOW_KEY not on GitHub (OK) — production uses Vercel INDEXNOW_KEY"
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "Add CRON_SECRET to GitHub repo secrets (same value as Vercel production)"
            exit 0
          fi
          echo "Waiting 90s for Vercel production deploy..."
          sleep 90
          python3 -c "
          import json, os, urllib.request
          slugs = [s for s in os.environ.get('SLUGS', '').split() if s]
          body = json.dumps({'slugs': slugs}).encode()
          req = urllib.request.Request(
              os.environ['SITE'] + '/api/indexing/notify',
              data=body,
              headers={
                  'Authorization': 'Bearer ' + os.environ['CRON_SECRET'],
                  'Content-Type': 'application/json',
              },
              method='POST',
          )
          with urllib.request.urlopen(req, timeout=90) as r:
              print('Production IndexNow notify:', r.read().decode()[:500])
          "

      - name: Trigger production cron (social + reddit)
        if: github.event.inputs.skip_remote_cron != 'true'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE: https://www.wreckmatch.com
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET not set - skip remote cron (add secret in GitHub)"
            exit 0
          fi
          for path in /api/automation/social /api/automation/reddit; do
            echo "Calling $SITE$path"
            curl -sf -H "Authorization: Bearer $CRON_SECRET" "$SITE$path" || echo "warn: $path failed"
            sleep 5
          done
